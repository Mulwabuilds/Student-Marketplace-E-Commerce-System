{% extends 'base.html' %}
{% load static %}
{% block content %}
<div class="row-between mb-8">
    <div>
        <h1 class="page-title">Available goods</h1>
        <p class="page-subtitle">Items currently for sale on campus.</p>
    </div>
    <a href="{% url 'good_create' %}" class="btn btn-primary">+ Sell an item</a>
</div>

<form method="get" class="filter-bar"
      hx-get="{% url 'good_list' %}"
      hx-target="#listing-grid"
      hx-swap="outerHTML"
      hx-push-url="true"
      hx-trigger="change, keyup changed delay:400ms from:input[name='q']"
      hx-indicator=".filter-spinner">
    <input type="text" name="q" value="{{ request.GET.q }}" placeholder="Search title or description">
    <select name="category">
        <option value="">All categories</option>
        {% for cat in categories %}
            <option value="{{ cat.pk }}" {% if request.GET.category == cat.pk|stringformat:"s" %}selected{% endif %}>{{ cat.name }}</option>
        {% endfor %}
    </select>
    <select name="condition">
        <option value="">Any condition</option>
        <option value="new" {% if request.GET.condition == 'new' %}selected{% endif %}>New</option>
        <option value="used" {% if request.GET.condition == 'used' %}selected{% endif %}>Used</option>
    </select>
    <input type="number" name="price_min" value="{{ request.GET.price_min }}" placeholder="Min price" step="0.01">
    <input type="number" name="price_max" value="{{ request.GET.price_max }}" placeholder="Max price" step="0.01">
    <span class="filter-spinner htmx-indicator" aria-hidden="true">⏳</span>
</form>

{% include 'goods/_listing_grid.html' with goods=goods %}
{% endblock %}
