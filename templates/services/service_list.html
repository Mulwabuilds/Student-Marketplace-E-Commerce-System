{% extends "base.html" %}
{% load static %}
{% block content %}
<div class="row-between mb-8">
    <div>
        <h1 class="page-title">Available services</h1>
        <p class="page-subtitle">Services offered by students on campus.</p>
    </div>
    <a href="{% url 'service_create' %}" class="btn btn-primary">+ Offer a service</a>
</div>

<form method="get" class="filter-bar"
      hx-get="{% url 'service_list' %}"
      hx-target="#listing-grid"
      hx-swap="outerHTML"
      hx-push-url="true"
      hx-trigger="change, keyup changed delay:400ms from:input[name='q']"
      hx-indicator=".filter-spinner">
    <input type="text" name="q" value="{{ request.GET.q }}" placeholder="Search title or description">
    <input type="number" name="price_min" value="{{ request.GET.price_min }}" placeholder="Min price" step="0.01">
    <input type="number" name="price_max" value="{{ request.GET.price_max }}" placeholder="Max price" step="0.01">
    <span class="filter-spinner htmx-indicator" aria-hidden="true">⏳</span>
</form>

{% include 'services/_listing_grid.html' with services=services %}
{% endblock %}
