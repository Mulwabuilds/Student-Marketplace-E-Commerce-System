{% extends "base.html" %}
{% block content %}
<div class="card card-pad" style="max-width:420px;margin:0 auto;text-align:center;border-color:var(--red-100);">
    <h1 class="section-title">Delete "{{ service.title }}"?</h1>
    <p class="text-muted" style="font-size:14px;">This action cannot be undone.</p>

    <form method="POST" style="margin-top:20px;display:flex;justify-content:center;gap:12px;">
        {% csrf_token %}
        <a href="{% url 'service_detail' service.pk %}" class="btn btn-outline">Cancel</a>
        <button type="submit" class="btn btn-danger">Yes, delete</button>
    </form>
</div>
{% endblock %}
