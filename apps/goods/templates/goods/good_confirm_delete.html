{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-danger">
                <div class="card-body text-center">
                    <h3 class="text-danger mb-4">Confirm Deletion</h3>
                    <p class="lead">Are you sure you want to delete your listing for <strong>"{{ object.title }}"</strong>?</p>
                    <p class="text-muted">This action cannot be undone.</p>
                    
                    <form method="post" class="mt-4">
                        {% csrf_token %}
                        <a href="{% url 'good_detail' object.pk %}" class="btn btn-outline-secondary me-2">Cancel</a>
                        <button type="submit" class="btn btn-danger">Yes, Delete It</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
